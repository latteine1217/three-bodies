<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>三體世界 / Trisolaris</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Noto+Serif+TC:wght@300;500&family=Spline+Sans+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* === 雙紀元主題系統 ===========================================================
     所有顏色/輝光/呼吸節奏皆引用 --era-* 變數。body.era-stable / body.era-chaotic
     切換整組變數，再由 --star-r/g/b（三日當下黑體平均色）即時微調強調色。
     恆紀元＝湛藍冷靜、呼吸緩慢；亂紀元＝赤橙灼熱、脈動加快、邊緣不安。 */
  :root {
    color-scheme: dark;
    /* 星色（由 ui.js 即時寫入三日黑體平均色，0-255）。預設恆紀元青。 */
    --star-r: 120; --star-g: 220; --star-b: 230;
    --star: rgb(var(--star-r), var(--star-g), var(--star-b));

    /* 預設＝恆紀元色票 */
    --accent: #46cfe0;
    --accent-2: #6fe6c0;
    --ink: #d6e6ea;
    --ink-dim: #7f97a0;
    --ink-faint: #4d6770;
    --bg: #04070b;
    --panel-bg: rgba(6, 12, 16, 0.90);
    --panel-edge: rgba(70, 205, 224, 0.62);
    --hair: rgba(70, 190, 210, 0.16);
    --glow: rgba(70, 205, 224, 0.36);
    --glow-strong: rgba(95, 225, 240, 0.65);
    --era-tint: rgba(70, 205, 224, 0.05);
    --breathe: 12s;       /* 面板呼吸週期：恆紀元緩慢 */
    --scan: 6.5s;         /* 掃描光條週期 */
    --unrest: 0;          /* 不安定度 0→1，亂紀元加邊緣抖動 */
  }
  body.era-chaotic {
    --accent: #ff6a3d;
    --accent-2: #ffb24a;
    --ink: #f3e2d6;
    --ink-dim: #c08a78;
    --ink-faint: #7a4f44;
    --bg: #0a0503;
    --panel-bg: rgba(16, 7, 5, 0.90);
    --panel-edge: rgba(255, 120, 70, 0.70);
    --hair: rgba(255, 120, 70, 0.18);
    --glow: rgba(255, 110, 60, 0.42);
    --glow-strong: rgba(255, 150, 90, 0.75);
    --era-tint: rgba(255, 110, 60, 0.07);
    --breathe: 5.5s;      /* 亂紀元：呼吸加快、急促 */
    --scan: 3.2s;
    --unrest: 1;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden;
    background: var(--bg); color: var(--ink);
    font-family: "Spline Sans Mono", "SF Mono", "Cascadia Code", ui-monospace, Consolas, monospace;
    transition: background 1.6s ease; }
  #app { position: fixed; inset: 0; }

  /* 全螢幕紀元氛圍：極淡的徑向色暈，隨紀元/呼吸脈動，讓整個畫面邊緣帶上當前紀元的體溫 */
  #app::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 1;
    background: radial-gradient(120% 120% at 50% 50%, transparent 55%, var(--era-tint) 100%);
    mix-blend-mode: screen;
    animation: ambient-breathe var(--breathe) ease-in-out infinite;
    transition: background 1.6s ease;
  }
  @keyframes ambient-breathe { 0%,100%{ opacity: .5 } 50%{ opacity: 1 } }

  /* 左側控制面板 — 切角發光外框，外框色與呼吸由紀元驅動 */
  #panel {
    position: fixed; top: 12px; left: 12px; width: 272px; max-height: calc(100% - 24px);
    padding: 1px; user-select: none; font-size: 13px; z-index: 5;
    background: linear-gradient(150deg, var(--panel-edge), color-mix(in srgb, var(--panel-edge) 14%, transparent) 45%, var(--panel-edge));
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
    filter: drop-shadow(0 0 7px var(--glow));
    transition: transform .25s ease, opacity .25s ease, filter 1.4s ease, background 1.4s ease;
    animation: panel-breathe var(--breathe) ease-in-out infinite;
  }
  /* 呼吸：恆紀元微弱緩慢、亂紀元（--unrest:1）放大為灼熱脈動 */
  @keyframes panel-breathe {
    0%,100% { filter: drop-shadow(0 0 6px var(--glow)); }
    50%     { filter: drop-shadow(0 0 calc(9px + var(--unrest) * 11px) var(--glow-strong)); }
  }
  #panel.collapsed { transform: translateX(-120%); opacity: 0; pointer-events: none; }
  .panel-body {
    position: relative; max-height: calc(100vh - 26px); overflow-y: auto;
    padding: 14px 16px 16px;
    background: var(--panel-bg); backdrop-filter: blur(9px);
    clip-path: polygon(0 0, calc(100% - 13px) 0, 100% 13px, 100% 100%, 13px 100%, 0 calc(100% - 13px));
    background-image: repeating-linear-gradient(0deg, var(--era-tint) 0 1px, transparent 1px 3px);
    transition: background 1.4s ease;
  }
  /* 動態掃描光條：亂紀元更快 */
  #panel::after {
    content: ''; position: absolute; left: 2px; right: 2px; top: 2px; height: 2px; pointer-events: none;
    background: linear-gradient(90deg, transparent, var(--glow-strong), transparent);
    animation: panel-scan var(--scan) linear infinite;
  }
  @keyframes panel-scan { 0%{ top: 2px; opacity: 0 } 10%{ opacity: 1 } 90%{ opacity: 1 } 100%{ top: calc(100% - 4px); opacity: 0 } }
  #panel-collapse {
    position: absolute; top: 8px; right: 8px; width: 22px; height: 22px; flex: none;
    padding: 0; font-size: 14px; line-height: 1; z-index: 3;
  }
  #menu-toggle {
    position: fixed; top: 12px; left: 12px; width: 42px; height: 36px; z-index: 10;
    display: none; align-items: center; justify-content: center; font-size: 18px;
    filter: drop-shadow(0 0 5px var(--glow));
    clip-path: polygon(0 0, calc(100% - 9px) 0, 100% 100%, 0 100%);
  }
  #panel.collapsed ~ #menu-toggle { display: flex; }
  .hdr { display: flex; align-items: baseline; gap: 9px; }
  .hdr .dot { width: 7px; height: 7px; flex: none; align-self: center; border-radius: 50%;
    background: var(--star); box-shadow: 0 0 9px var(--star); animation: live 2s ease-in-out infinite;
    transition: background 1.2s ease, box-shadow 1.2s ease; }
  @keyframes live { 0%,100%{ opacity: 1 } 50%{ opacity: .2 } }
  /* 標題：羅馬碑刻體（Cinzel）＝天體紀念碑感，與等寬數據字形成層次 */
  #panel h1 { margin: 0; font-family: "Cinzel", serif; font-size: 17px; font-weight: 600;
    letter-spacing: 2px; color: var(--ink);
    text-shadow: 0 0 14px var(--glow); transition: text-shadow 1.2s ease; }
  #panel .title-zh { margin: 5px 0 0; font-family: "Noto Serif TC", serif; font-size: 13px; font-weight: 500;
    letter-spacing: 3px; color: var(--accent-2); transition: color 1.2s ease; }
  #panel .sub { margin: 7px 0 14px; font-size: 10px; color: var(--ink-dim); letter-spacing: .3px; line-height: 1.5; }
  .group { margin: 11px 0; padding-top: 10px; border-top: 1px solid var(--hair); transition: border-color 1.2s ease; }
  .group:first-of-type { border-top: none; padding-top: 2px; }
  .group-title { display: flex; align-items: center; gap: 7px;
    font-size: 10px; text-transform: uppercase; letter-spacing: 1.6px; color: var(--accent); margin-bottom: 8px;
    transition: color 1.2s ease; }
  .group-title::before { content: ''; width: 3px; height: 10px; flex: none; background: var(--accent); box-shadow: 0 0 6px var(--glow); }
  .group-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--glow), transparent); }
  .row.range { display: block; margin: 8px 0; }
  .row.range .head { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .row label { color: var(--ink-dim); transition: color 1.2s ease; }
  .row .val { font-variant-numeric: tabular-nums; color: var(--accent); font-size: 12px; transition: color 1.2s ease; }
  .row .val::before { content: '['; color: var(--ink-faint); margin-right: 3px; }
  .row .val::after { content: ']'; color: var(--ink-faint); margin-left: 3px; }
  input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
  .buttons { display: flex; gap: 8px; margin-top: 13px; }
  button {
    flex: 1; padding: 9px; cursor: pointer; font-size: 12px;
    background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 16%, #0b1014), color-mix(in srgb, var(--accent) 6%, #07090c));
    color: var(--ink);
    border: 1px solid color-mix(in srgb, var(--accent) 50%, transparent);
    transition: filter .15s, box-shadow .15s, background 1.4s ease, border-color 1.4s ease;
    font-family: inherit; letter-spacing: 2px;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 100%, 0 100%);
  }
  button:hover { filter: brightness(1.4); box-shadow: 0 0 12px var(--glow); }
  button.primary { background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 42%, #0b1014), color-mix(in srgb, var(--accent) 18%, #07090c)); border-color: var(--accent); }
  .check { display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--ink-dim); transition: color 1.2s ease; }
  .check input { width: 15px; height: 15px; accent-color: var(--accent); }

  /* 右側資訊欄：時鐘 + 排行榜 + 日誌（讀數用等寬，紀元用碑刻體） */
  #clock, #hud, #sidebar { font-family: "Spline Sans Mono", "SF Mono", ui-monospace, Consolas, monospace; }
  #clock {
    position: fixed; top: 14px; right: 18px; text-align: right; cursor: pointer; user-select: none; z-index: 5;
    text-shadow: 0 2px 14px rgba(0,0,0,.8);
  }
  #clock-civ { font-size: 11px; letter-spacing: 2.5px; color: var(--ink-dim); margin-bottom: 3px; transition: color 1.2s ease; }
  #clock-time { font-size: 32px; font-weight: 300; letter-spacing: 3px; font-variant-numeric: tabular-nums;
    color: var(--ink); text-shadow: 0 0 18px var(--glow); transition: text-shadow 1.2s ease, color 1.2s ease; }
  /* 紀元徽記：碑刻襯線、切角、隨紀元換色與脈動 */
  #clock .era { display: inline-block; margin-top: 5px; font-family: "Cinzel", serif; font-size: 13px;
    padding: 3px 14px; letter-spacing: 4px; font-weight: 500;
    clip-path: polygon(0 0, calc(100% - 7px) 0, 100% 100%, 7px 100%);
    transition: background 1.2s ease, color 1.2s ease, box-shadow 1.2s ease; }
  #clock .era.stable  { background: rgba(70,205,224,.14); color: #8fe8df; border-bottom: 1px solid rgba(70,205,224,.5);
    box-shadow: 0 0 16px rgba(70,205,224,.28); }
  #clock .era.chaotic { background: rgba(255,90,55,.16); color: #ffae8a; border-bottom: 1px solid rgba(255,110,70,.6);
    box-shadow: 0 0 20px rgba(255,90,40,.42); animation: era-throb 1.4s ease-in-out infinite; }
  @keyframes era-throb { 0%,100%{ box-shadow: 0 0 14px rgba(255,90,40,.32) } 50%{ box-shadow: 0 0 26px rgba(255,110,50,.6) } }
  #clock .toggle-hint { display: block; font-size: 9.5px; color: var(--ink-faint); margin-top: 6px; letter-spacing: 1px; }

  #sidebar {
    position: fixed; top: 104px; right: 18px; width: 250px; max-height: calc(100% - 122px);
    display: flex; flex-direction: column; gap: 11px; transition: opacity .2s, transform .2s; z-index: 5;
  }
  #sidebar.hidden { opacity: 0; transform: translateX(20px); pointer-events: none; }
  .card {
    padding: 11px 13px;
    background: var(--panel-bg); backdrop-filter: blur(9px);
    border: 1px solid color-mix(in srgb, var(--accent) 24%, transparent);
    clip-path: polygon(0 0, calc(100% - 11px) 0, 100% 11px, 100% 100%, 11px 100%, 0 calc(100% - 11px));
    filter: drop-shadow(0 0 6px var(--glow));
    transition: background 1.4s ease, border-color 1.4s ease, filter 1.4s ease;
  }
  .card-title { display: flex; align-items: center; gap: 7px;
    font-size: 10px; text-transform: uppercase; letter-spacing: 1.6px; color: var(--accent); margin-bottom: 9px;
    transition: color 1.2s ease; }
  .card-title::before { content: ''; width: 3px; height: 10px; flex: none; background: var(--accent); box-shadow: 0 0 6px var(--glow); }
  .card-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--glow), transparent); }
  .board-item { display: flex; align-items: center; gap: 8px; font-size: 12px; margin: 5px 0; }
  .board-item .rank { width: 16px; color: var(--accent); font-variant-numeric: tabular-nums; text-align: center; }
  .board-item .name { flex: 1; color: var(--ink); }
  .board-item .lvl { color: var(--accent-2); font-size: 11px; }
  .board-item .yrs { color: var(--ink-dim); font-size: 10.5px; font-variant-numeric: tabular-nums; }
  .board-empty { font-size: 12px; color: var(--ink-faint); }
  #log { max-height: 240px; overflow-y: auto; }
  /* 日誌條目：左側細色條標示事件類別，逐條淡入 */
  .log-item { font-size: 11.5px; line-height: 1.55; color: var(--ink-dim); padding: 2px 0 2px 9px;
    border-left: 2px solid transparent; transition: color 1.2s ease; }
  .log-item.era   { color: var(--accent); border-left-color: color-mix(in srgb, var(--accent) 60%, transparent); }
  .log-item.level { color: #6fe0b0; border-left-color: rgba(95,210,160,.6); }
  .log-item.doom  { color: #ff9a82; border-left-color: rgba(255,110,70,.7); font-weight: 500;
    animation: doom-ember 2.4s ease-out 1; }
  @keyframes doom-ember { 0%{ background: rgba(255,80,40,.28) } 100%{ background: transparent } }

  #hud {
    position: fixed; bottom: 13px; left: 14px; font-size: 11px; color: var(--ink-dim);
    font-variant-numeric: tabular-nums; pointer-events: none; text-shadow: 0 1px 6px rgba(0,0,0,.8);
    transition: color 1.2s ease; z-index: 5;
  }
  #hint { position: fixed; bottom: 13px; right: 18px; font-size: 11px; color: var(--ink-faint); pointer-events: none; z-index: 5; }
  /* 名言：襯線中文（Noto Serif TC），亂紀元時染上一絲灼色 */
  #quote {
    position: fixed; bottom: 34px; left: 50%; transform: translateX(-50%);
    max-width: 62%; text-align: center; font-family: "Noto Serif TC", serif; font-size: 15px; font-weight: 300;
    letter-spacing: 2px; color: color-mix(in srgb, var(--ink) 78%, var(--accent));
    pointer-events: none; text-shadow: 0 2px 14px rgba(0,0,0,.9), 0 0 22px color-mix(in srgb, var(--glow) 50%, transparent);
    transition: opacity 1.2s ease, color 1.4s ease; opacity: 0; z-index: 5;
  }

  /* === 戲劇化轉場層 ============================================================ */
  /* 紀元切換掃描：一道色帶自上而下掃過全螢幕，顏色取當前紀元強調色 */
  #era-veil {
    position: fixed; inset: 0; pointer-events: none; z-index: 8; opacity: 0;
    background: linear-gradient(180deg, transparent 0%, color-mix(in srgb, var(--accent) 30%, transparent) 48%, color-mix(in srgb, var(--accent) 55%, transparent) 50%, color-mix(in srgb, var(--accent) 30%, transparent) 52%, transparent 100%);
  }
  #era-veil.sweep { animation: era-sweep 1.6s cubic-bezier(.5,0,.2,1) 1; }
  @keyframes era-sweep {
    0%   { opacity: 0; transform: translateY(-100%); }
    18%  { opacity: 1; }
    82%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(100%); }
  }
</style>
</head>
<body>
<div id="app"></div>

<!-- 戲劇化轉場層：紀元掃描（純視覺，由 ui.js 觸發 class） -->
<div id="era-veil"></div>

<div id="panel">
  <button id="panel-collapse" title="收合面板">‹</button>
  <div class="panel-body">
  <div class="hdr"><span class="dot"></span><h1>TRISOLARIS</h1></div>
  <p class="title-zh">三體世界 · 三日凌空</p>
  <p class="sub">為使文明長期穩定發展，請尋找太陽運行的規律</p>

  <div class="group">
    <div class="group-title">天體質量</div>
    <div class="row range"><div class="head"><label>主星 1 質量</label><span class="val" id="v-mass1">2.0e7</span></div>
      <input type="range" id="mass1" min="1e6" max="1e8" step="1e6" value="2.0e7"></div>
    <div class="row range"><div class="head"><label>主星 2 質量</label><span class="val" id="v-mass2">1.3e7</span></div>
      <input type="range" id="mass2" min="1e6" max="1e8" step="1e6" value="1.3e7"></div>
    <div class="row range"><div class="head"><label>主星 3 質量</label><span class="val" id="v-mass3">2.9e7</span></div>
      <input type="range" id="mass3" min="1e6" max="1e8" step="1e6" value="2.9e7"></div>
    <div class="row range"><div class="head"><label>第四天體質量</label><span class="val" id="v-mass4">10</span></div>
      <input type="range" id="mass4" min="0" max="1000" step="1" value="10"></div>
  </div>

  <div class="group">
    <div class="group-title">動力學</div>
    <div class="row range"><div class="head"><label>模擬速度</label><span class="val" id="v-speed">1.00×</span></div>
      <input type="range" id="speed" min="1" max="4" step="0.05" value="1"></div>
    <div class="row range"><div class="head"><label>初始自轉</label><span class="val" id="v-spin">1.00</span></div>
      <input type="range" id="spin" min="0" max="2" step="0.01" value="1"></div>
    <div class="row range"><div class="head"><label>引力軟化距離</label><span class="val" id="v-ras">0.15</span></div>
      <input type="range" id="ras" min="0.01" max="0.5" step="0.01" value="0.15"></div>
  </div>

  <div class="group">
    <div class="group-title">邊界收束</div>
    <label class="check"><input type="checkbox" id="contain" checked> 飛離恆星減速折返</label>
    <div class="row range" style="margin-top:8px"><div class="head"><label>收束半徑</label><span class="val" id="v-containR">8.0</span></div>
      <input type="range" id="containR" min="6" max="15" step="0.1" value="8.0"></div>
    <div class="row range"><div class="head"><label>收束強度</label><span class="val" id="v-containK">6</span></div>
      <input type="range" id="containK" min="1" max="20" step="0.5" value="6"></div>
  </div>

  <div class="group">
    <div class="group-title">軌跡 / 視覺</div>
    <label class="check"><input type="checkbox" id="trailen" checked> 顯示軌跡</label>
    <div class="row range" style="margin-top:8px"><div class="head"><label>軌跡長度</label><span class="val" id="v-trail">1000</span></div>
      <input type="range" id="trail" min="50" max="4000" step="10" value="1000"></div>
    <div class="row range"><div class="head"><label>輝光強度</label><span class="val" id="v-bloom">1.20</span></div>
      <input type="range" id="bloom" min="0" max="2.5" step="0.05" value="1.2"></div>
  </div>

  <div class="buttons">
    <button id="randomize" class="primary">隨機擾動</button>
    <button id="reset">重置</button>
  </div>
  </div><!-- /panel-body -->
</div>

<button id="menu-toggle" title="開啟面板">☰</button>

<div id="clock">
  <div id="clock-civ">第 1 號文明</div>
  <div id="clock-time">00:00:00</div>
  <span id="clock-era" class="era chaotic">亂紀元</span>
  <span class="toggle-hint">單擊切換側欄</span>
</div>

<div id="sidebar">
  <div class="card">
    <div class="card-title">文明排行榜</div>
    <div id="leaderboard"><div class="board-empty">尚無文明記錄</div></div>
  </div>
  <div class="card">
    <div class="card-title">文明日誌</div>
    <div id="log"></div>
  </div>
</div>

<div id="hud"></div>
<div id="quote"></div>
<div id="hint">滑鼠拖曳旋轉 · 滾輪縮放</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="js/main.js"></script>
</body>
</html>
